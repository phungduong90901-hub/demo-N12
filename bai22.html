<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css"/>
</head>
<body>
    <div class="container mt-3">
        <div class="mb-3">
            <label class="form-label fw-bold">Ho Ten:</label>
            <input class="form-control bg-info" type="text" name="HoTen" onmousemove="thongBao('Ban dang di chuyen chuot vao o nhap ho ten')"/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold mb-3">Gioi tinh:</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="GioiTinh" onmousemove="thongBao('Ban dang di chuyen chuot vao gioi tinh Nam')"/> Nam
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="GioiTinh" onmousemove="thongBao('Ban dang di chuyen chuot vao gioi tinh Nu')"/> Nu
            </div>
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="button" value="Gui" onmousemove="thongBao('Ban dang di chuyen chuot vao nut Gui')"/>
        </div>
        <div class="alert alert-info mt-3" id="status">Di chuyen vao cac phan tu de xem thong bao</div>
    </div>
    <script>
        function thongBao(noiDung){
            document.getElementById("status").innerHTML = noiDung;
        }
    </script>
</body>
</html>
