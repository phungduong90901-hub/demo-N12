<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>

  <body style="background-color: red;">
    <div class="container text-center mt-5">
      <form>
        <div class="form-group mb-3">
          <label class="form-label fw-bold fs-2">Chọn màu:</label>
          <select class="form-select text-center fs-4" onchange="DoiMau(this.value)">
            <option value="red" selected>Màu đỏ</option>
            <option value="cyan">Màu xanh</option>
            <option value="brown">Màu nâu</option>
            <option value="lavender">Màu tím nhạt</option>
          </select>
        </div>
      </form>
    </div>

    <script>
      function DoiMau(mau) {
        document.body.style.backgroundColor = mau;
      }
    </script>
  </body>
</html>
